<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⏰ World Clock</h1>
        <p class="subtitle">Current Time in Different Time Zones</p>
        
        <div class="clocks-grid" id="clocksContainer">
            <!-- Clocks will be generated here by JavaScript -->
        </div>
        
        <div class="add-timezone">
            <input 
                type="text" 
                id="timezoneInput" 
                placeholder="e.g., Asia/Bangkok, America/New_York, Europe/London"
                list="timezoneList"
            >
            <datalist id="timezoneList">
                <!-- Common timezones will be populated by JavaScript -->
            </datalist>
            <button onclick="addTimezone()">+ Add Timezone</button>
        </div>
        
        <div class="info">
            <p>💡 Tip: Click on any timezone card to remove it</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
